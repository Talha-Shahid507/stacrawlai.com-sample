<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Log In — StackCrawlAI</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo"><div class="nav-logo-icon">⚡</div>StackCrawl<span style="color:var(--accent)">AI</span></a>
  <ul class="nav-links"></ul>
  <div class="nav-cta">
    <span style="font-size:0.875rem;color:var(--muted);">Don't have an account?</span>
    <a href="signup.html" class="btn btn-primary">Sign Up Free</a>
  </div>
</nav>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 2rem 2rem;">
  <div style="width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <div class="nav-logo-icon" style="width:48px;height:48px;margin:0 auto 1rem;font-size:24px;">⚡</div>
      <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;margin-bottom:0.5rem;">Welcome back</h1>
      <p style="color:var(--muted);font-size:0.9rem;">Sign in to your StackCrawlAI account</p>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;">
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@company.com" required/>
        </div>
        <div class="form-group">
          <label style="display:flex;justify-content:space-between;align-items:center;">
            Password <a href="#" style="color:var(--accent);text-decoration:none;font-size:0.75rem;">Forgot?</a>
          </label>
          <input type="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">Sign In →</button>
      </form>

      <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:0.75rem;color:var(--muted);">or continue with</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <button class="btn btn-ghost" style="justify-content:center;gap:8px;" onclick="showToast('GitHub OAuth coming soon!')">
          🐙 GitHub
        </button>
        <button class="btn btn-ghost" style="justify-content:center;gap:8px;" onclick="showToast('Google OAuth coming soon!')">
          🔵 Google
        </button>
      </div>
    </div>

    <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:1.5rem;">
      No account? <a href="signup.html" style="color:var(--accent);text-decoration:none;">Create one free →</a>
    </p>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);
  });
</script>
</body>
</html>
